version: '3.8'

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  django-web:
#    build: .
    image: atashin_gallery_dev-django-web:latest
    container_name: django-docker
    # collect static is temporarily because of IRAN server
    command: bash -c "python manage.py collectstatic --noinput && python manage.py migrate --noinput && gunicorn --bind 0.0.0.0:8000 atashin_gallery_backend.wsgi:application"
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      # .:/app is temporarily because of IRAN server
      - .:/app
      - static_volume:/app/staticfiles

  nginx:
#    build: ./nginx
    image: atashin_gallery_dev-nginx:latest
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django-web
    restart: unless-stopped
    volumes:
#      - ./ssl:/etc/ssl/certs:ro
      - static_volume:/app/staticfiles:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
#      - certbot_data:/etc/letsencrypt

